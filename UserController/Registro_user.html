<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Usuario</title>
    <link rel="stylesheet" href="Registro.css">
</head>
<body>
    <div class="register-container">
        <h2>Registro</h2>

        <form class="register-form" method="POST" action="UserController.php">

            <input type="hidden" name="rol" value="usuario">

            <div class="register-form-group">
                <label class="register-label">Nombre</label>
                <input type="text" class="register-input" name="name" required>
            </div>

            <div class="register-form-group">
                <label class="register-label">Correo electrónico</label>
                <input type="email" class="register-input" name="email" required>
            </div>

            <div class="register-form-group">
                <label class="register-label">Contraseña</label>
                <input type="password" class="register-input" name="password" required>
            </div>

            <button type="submit" name="Register" class="register-submit-btn">
                Registrarse
            </button>

        </form>
    </div>
</body>
</html>
